<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Limoeiro · Meta 15 Clientes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700;1,900&family=Barlow:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--lime:#C8F135;--black:#0D0D0D;--dark:#111;--card:#1A1A1A;--border:#2A2A2A;--white:#F0F0F0;--muted:#555}
  body{background:var(--black);font-family:'Barlow',sans-serif;color:var(--white);min-height:100vh;padding:0 0 48px;max-width:640px;margin:0 auto}
  .topbar{background:var(--dark);border-bottom:3px solid var(--lime);padding:16px 20px;display:flex;align-items:center;gap:10px;margin-bottom:0}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:1.5rem;color:var(--lime);text-transform:uppercase}
  .ctitle{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
  .strip{background:var(--lime);padding:9px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:0.8rem;letter-spacing:2px;color:var(--black);text-align:center;text-transform:uppercase;margin-bottom:20px}
  .w{padding:0 18px}
  .hero{background:var(--lime);border-radius:12px;padding:20px 22px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .hl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.7rem;text-transform:uppercase;letter-spacing:3px;color:#333}
  .hc{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:3.8rem;color:var(--black);line-height:1}
  .hc span{font-size:1.5rem;font-weight:700;color:#444}
  .hr{text-align:right}
  .bwrap{margin-bottom:14px}
  .blbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:7px}
  .bbg{background:var(--border);border-radius:99px;height:7px;overflow:hidden}
  .bfill{height:100%;border-radius:99px;background:var(--lime);transition:width .5s}
  .dots{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
  .dot{width:36px;height:36px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem;color:var(--muted);cursor:pointer;transition:all .2s;user-select:none;position:relative}
  .dot.on{background:var(--lime);border-color:var(--lime);color:var(--black)}
  .dot:hover:not(.on){border-color:var(--lime);color:var(--lime)}
  .tip{display:none;position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#222;border:1px solid var(--border);color:var(--white);font-size:0.6rem;white-space:nowrap;padding:3px 7px;border-radius:5px;pointer-events:none;z-index:10}
  .dot:hover .tip{display:block}
  .dcard{background:var(--card);border-radius:12px;border:1px solid var(--border);border-left:4px solid var(--lime);padding:20px;margin-bottom:12px}
  .dtag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:3px;color:var(--lime);margin-bottom:9px}
  .demoji{font-size:1.8rem;display:block;margin-bottom:7px}
  .dmsg{font-size:1rem;line-height:1.65;color:var(--white)}
  .ctrls{display:flex;gap:10px;margin-bottom:12px}
  .btn{flex:1;padding:13px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
  .bprev{background:var(--card);border:1px solid var(--border);color:var(--white)}
  .bnext{background:var(--lime);color:var(--black)}
  .btn:hover{opacity:.85;transform:translateY(-1px)}
  .btn:disabled{opacity:.25;cursor:default;transform:none}
  .cbtn{width:100%;padding:14px;border-radius:8px;border:2px solid var(--lime);background:transparent;color:var(--lime);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .25s;margin-bottom:18px}
  .cbtn.on{background:var(--lime);color:var(--black)}
  .cbtn:hover{background:var(--lime);color:var(--black)}
  .lcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
  .ltitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin-bottom:12px}
  .ci{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.88rem}
  .ci:last-child{border-bottom:none}
  .cn{width:26px;height:26px;border-radius:5px;background:var(--lime);color:var(--black);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .nc{color:var(--muted);font-size:0.82rem}
  .foot{text-align:center;font-size:0.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .lico{width:32px;height:32px}
</style>
</head>
<body>
<div class="topbar">
  <svg class="lico" viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="17" stroke="#C8F135" stroke-width="2"/>
    <circle cx="18" cy="18" r="11" fill="#C8F135" opacity=".12"/>
    <line x1="18" y1="7" x2="18" y2="29" stroke="#C8F135" stroke-width="1.5"/>
    <line x1="7" y1="18" x2="29" y2="18" stroke="#C8F135" stroke-width="1.5"/>
    <line x1="10.5" y1="10.5" x2="25.5" y2="25.5" stroke="#C8F135" stroke-width="1"/>
    <line x1="25.5" y1="10.5" x2="10.5" y2="25.5" stroke="#C8F135" stroke-width="1"/>
    <circle cx="18" cy="18" r="3" fill="#C8F135"/>
  </svg>
  <div class="logo">Grupo Limoeiro</div>
  <div class="ctitle">Campanha Jun/2026</div>
</div>
<div class="strip">🍋 Somos conhecidos por fazer do limão, uma limonada!</div>
<div class="w">
  <div class="hero">
    <div>
      <div class="hl">Clientes fechados</div>
      <div class="hc" id="cnt">0 <span>/ 15</span></div>
    </div>
    <div class="hr">
      <div class="hl" style="margin-bottom:5px">Restam</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2.2rem;color:#333;line-height:1" id="rem">15</div>
    </div>
  </div>
  <div class="bwrap">
    <div class="blbl">Progresso — junho 2026</div>
    <div class="bbg"><div class="bfill" id="bar" style="width:0%"></div></div>
  </div>
  <div class="dots" id="grid"></div>
  <div class="dcard">
    <div class="dtag" id="tag"></div>
    <span class="demoji" id="emo"></span>
    <div class="dmsg" id="msg"></div>
  </div>
  <div class="ctrls">
    <button class="btn bprev" id="bp" onclick="cd(-1)">← Anterior</button>
    <button class="btn bnext" id="bn" onclick="cd(1)">Próximo →</button>
  </div>
  <button class="cbtn" id="cb" onclick="tc()">+ Marcar cliente fechado hoje</button>
  <div class="lcard">
    <div class="ltitle">Clientes fechados</div>
    <div id="cl"></div>
  </div>
  <div class="foot">Toque nos quadrados para marcar · <span id="rf">15</span> restantes</div>
</div>
<script>
const M=[
  {e:"🔥",t:"Arrancada! O mês começa hoje e a meta está clara: 15 clientes em junho. Cada contato feito agora é uma semente. Plantem bem — os resultados de final de mês são construídos aqui."},
  {e:"🎯",t:"Foco total. Cada 'não' que você ouve hoje te aproxima do 'sim' que você precisa. O pipeline não se constrói esperando — liga, visita, manda a proposta. Ação gera resultado."},
  {e:"💡",t:"Quem fecha mais clientes não é quem tem o melhor produto — é quem entende melhor o problema do cliente. Hoje, antes de falar, pergunte. Ouça com atenção. A solução vem naturalmente."},
  {e:"⚡",t:"Urgência é combustível. Prospects em dúvida precisam de um empurrão — e vocês são esse empurrão. Não deixem leads esfriarem. Uma mensagem a tempo vale mais do que uma proposta tarde."},
  {e:"🏆",t:"Times que chegam longe são os que não param quando está difícil. Se hoje pareceu pesado, saibam: estão exatamente onde devem estar. O resultado aparece pra quem não desiste."},
  {e:"🚀",t:"Fechem a semana forte! Revisem o pipeline: tem alguém esperando retorno? Um lead esquecido pode ser o próximo cliente. O follow-up de hoje fecha o negócio de segunda."},
  {e:"📋",t:"Final de semana estratégico. Usem esse momento para organizar os contatos, revisar propostas abertas e já deixar os primeiros movimentos da semana que vem prontos."},
  {e:"💪",t:"Segunda semana, segunda arrancada! Vocês chegaram aqui com 4 clientes fechados — isso é consistência. Agora é usar o ritmo conquistado para acelerar. A curva vira hoje."},
  {e:"🔍",t:"Revisem juntos: qual é o perfil dos clientes que fecharam mais rápido? Repliquem esse approach com os prospects em aberto. Dados guiam vendas inteligentes."},
  {e:"🌟",t:"Dez dias de campanha. Vocês sabem mais sobre o mercado agora do que no começo. Use esse conhecimento — a conversa de hoje pode ser a mais afiada do mês."},
  {e:"🔑",t:"Um terço do mês passou. Cada cliente a mais agora vale dobrado pra pressão lá na frente. Intensifiquem sem perder a qualidade das abordagens."},
  {e:"⏱️",t:"Prospects que estavam 'pensando' precisam de um motivo para decidir agora. Uma condição especial, uma urgência real, um diferencial bem colocado — movam o ponteiro hoje."},
  {e:"🦁",t:"Metade do mês se aproxima. Times fortes não deixam a segunda quinzena acumular o trabalho da primeira. O que está em aberto? Tragam para perto, aqueçam, fechem."},
  {e:"🎯",t:"Sábado de revisão. O que funcionou? O que pode melhorar? As melhores vendas da próxima semana começam com as perguntas certas feitas hoje."},
  {e:"🌅",t:"Meio do mês. 15 dias pela frente — tempo mais do que suficiente para bater a meta. Mas só com a mesma intensidade da primeira metade. Vamos com tudo!"},
  {e:"🔥",t:"Semana decisiva começa agora. Cada contato desta semana pesa mais: o fim do mês está mais perto e os clientes sentem a pressão também. Usem isso com inteligência."},
  {e:"📞",t:"A ligação que você está com preguiça de fazer hoje pode ser a que fecha o negócio. Simples assim. Menos hesitação, mais ação. Quem discou primeiro, fechou primeiro."},
  {e:"🧠",t:"Inteligência comercial: revisem quais propostas estão abertas há mais de 5 dias. Um follow-up bem feito hoje pode virar assinatura amanhã."},
  {e:"⚡",t:"Quinta-feira é o dia mais produtivo da semana. Aproveitem o pico de energia: agendem as conversas mais importantes, apresentem as propostas mais relevantes."},
  {e:"🚀",t:"Sexta! Fechem a terceira semana com conquistas. Mesmo que o cliente não feche hoje, garantam o próximo passo claro — uma data, uma reunião, uma resposta."},
  {e:"🏅",t:"Sábado de recarga. Descansem com a consciência de quem trabalhou bem. E já pensem: quem vocês vão ligar na segunda de manhã?"},
  {e:"🌟",t:"Última semana completa do mês! A pressão é real, mas pressão é privilégio de quem está na corrida. Cada dia desta semana vale ouro."},
  {e:"💡",t:"Sentem a urgência crescendo? Os clientes também sentem. Fechamentos no fim do mês acontecem porque alguém teve a coragem de pedir o sim na hora certa."},
  {e:"🎯",t:"Terça decisiva. Revisem toda a lista de leads com proposta aberta. Priorizem os que estão mais quentes. Agora o foco é total."},
  {e:"🦁",t:"Quarta do sprint final. Cinco dias para o fim do mês. O que falta para fechar? Liguem. Visitem. Mandem o contrato. A meta está ao alcance."},
  {e:"⏱️",t:"Quatro dias. Cada hora conta. Não é hora de prospectar do zero — é hora de converter o que já está quente. Identifiquem o mais próximo de fechar e fechem."},
  {e:"🔑",t:"Penúltima sexta do mês. Ainda há tempo hoje para fazer a diferença. Um e-mail, uma ligação, uma proposta revisada — façam agora, não na segunda."},
  {e:"📋",t:"Final de semana com a meta na cabeça. Usem o domingo para organizar o ataque final: segunda e terça podem definir o resultado do mês."},
  {e:"🚀",t:"Penúltimo dia! Se a meta ainda não foi batida, hoje é o dia do esforço máximo. Se já foi — ajudem o colega ou abram o próximo mês com vantagem."},
  {e:"🏆",t:"Último dia de junho. Vocês construíram aprendizado, consistência e confiança. Fechem com tudo hoje. Amanhã celebrem. O Grupo Limoeiro fez a limonada! 🍋"},
];
let d=7;
const N=new Array(15).fill("");
N[0]="Maria Fit";N[1]="Hidrodomi";N[2]="Tia Zuma";N[3]="Marett Calçados";
const C=new Array(15).fill(false);
C[0]=C[1]=C[2]=C[3]=true;
const DC=new Array(30).fill(false);
DC[0]=DC[1]=DC[2]=DC[3]=true;
const S=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const gd=i=>S[(1+i)%7];
const cnt=()=>C.filter(Boolean).length;
function rg(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let i=0;i<15;i++){
    const e=document.createElement('div');e.className='dot'+(C[i]?' on':'');e.textContent=C[i]?'✓':(i+1);
    if(N[i]){const t=document.createElement('div');t.className='tip';t.textContent=N[i];e.appendChild(t);}
    e.onclick=()=>{C[i]=!C[i];ra();};g.appendChild(e);
  }
}
function rp(){
  const c=cnt();
  document.getElementById('cnt').innerHTML=c+' <span>/ 15</span>';
  document.getElementById('bar').style.width=(c/15*100)+'%';
  document.getElementById('rem').textContent=15-c;
  document.getElementById('rf').textContent=15-c;
}
function rm(){
  const m=M[d];
  document.getElementById('tag').textContent=String(d+1).padStart(2,'0')+'/jun · '+gd(d)+' · Dia '+(d+1)+' de 30';
  document.getElementById('emo').textContent=m.e;
  document.getElementById('msg').textContent=m.t;
  document.getElementById('bp').disabled=d===0;
  document.getElementById('bn').disabled=d===29;
}
function rb(){
  const b=document.getElementById('cb');
  if(DC[d]){b.textContent='✓ Cliente marcado neste dia!';b.classList.add('on');}
  else{b.textContent='+ Marcar cliente fechado hoje';b.classList.remove('on');}
}
function tc(){
  if(!DC[d]){
    const s=C.indexOf(false);
    if(s===-1){alert('Todos os 15 clientes marcados! 🏆🍋');return;}
    C[s]=true;DC[d]=true;
  }else{
    DC[d]=false;
    const x=C.map((v,i)=>v&&i>=4?i:-1).filter(x=>x>=0);
    if(x.length>0)C[x[x.length-1]]=false;
    else{const r=C.map((v,i)=>v&&![0,1,2,3].includes(i)?i:-1).filter(x=>x>=0);if(r.length>0)C[r[r.length-1]]=false;}
  }
  ra();
}
function cd(v){d=Math.max(0,Math.min(29,d+v));ra();}
function rl(){
  const inn=document.getElementById('cl');
  const named=N.map((n,i)=>({n,i})).filter(x=>C[x.i]&&x.n);
  const unn=C.map((v,i)=>v&&!N[i]?i:-1).filter(x=>x>=0);
  let h='',n=1;
  named.forEach(x=>{h+='<div class="ci"><div class="cn">'+n+++'</div><span>'+x.n+'</span></div>';});
  unn.forEach(()=>{h+='<div class="ci"><div class="cn">'+n+++'</div><span style="color:var(--muted)">Cliente fechado</span></div>';});
  inn.innerHTML=h||'<div class="nc">Nenhum cliente registrado ainda.</div>';
}
function ra(){rg();rp();rm();rb();rl();}
ra();
</script>
</body>
</html>
