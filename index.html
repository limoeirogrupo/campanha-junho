<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Limoeiro · Meta 15 Clientes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700;1,900&family=Barlow:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--lime:#C8F135;--black:#0D0D0D;--dark:#111;--card:#1A1A1A;--border:#2A2A2A;--white:#F0F0F0;--muted:#555}
body{background:var(--black);font-family:'Barlow',sans-serif;color:var(--white);min-height:100vh;padding:0 0 48px;max-width:640px;margin:0 auto}
.topbar{background:var(--dark);border-bottom:3px solid var(--lime);padding:14px 20px;display:flex;align-items:center;gap:10px}
.logoimg{height:38px;width:auto}
.ctitle{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.strip{background:var(--lime);padding:9px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:.8rem;letter-spacing:2px;color:var(--black);text-align:center;text-transform:uppercase;margin-bottom:20px}
.w{padding:0 18px}
.hero{background:var(--lime);border-radius:12px;padding:20px 22px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.hl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:3px;color:#333}
.hc{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:3.8rem;color:var(--black);line-height:1}
.hc span{font-size:1.5rem;font-weight:700;color:#444}
.bwrap{margin-bottom:14px}
.blbl{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:7px}
.bbg{background:var(--border);border-radius:99px;height:7px;overflow:hidden}
.bfill{height:100%;border-radius:99px;background:var(--lime);transition:width .5s}
.dots{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.dot{width:36px;height:36px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;color:var(--muted);user-select:none;position:relative}
.dot.on{background:var(--lime);border-color:var(--lime);color:var(--black)}
.dot .tip{display:none;position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#222;border:1px solid var(--border);color:var(--white);font-size:.6rem;white-space:nowrap;padding:3px 7px;border-radius:5px;pointer-events:none;z-index:10}
.dot:hover .tip{display:block}
.dcard{background:var(--card);border-radius:12px;border:1px solid var(--border);border-left:4px solid var(--lime);padding:20px;margin-bottom:12px}
.dtag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:3px;color:var(--lime);margin-bottom:9px}
.demoji{font-size:1.8rem;display:block;margin-bottom:7px}
.dmsg{font-size:1rem;line-height:1.65}
.ctrls{display:flex;gap:10px;margin-bottom:14px}
.btn{flex:1;padding:13px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.bprev{background:var(--card);border:1px solid var(--border);color:var(--white)}
.bnext{background:var(--lime);color:var(--black)}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:disabled{opacity:.25;cursor:default;transform:none}
.addbox{background:var(--card);border:2px solid var(--lime);border-radius:12px;padding:18px;margin-bottom:14px}
.addtitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:3px;color:var(--lime);margin-bottom:12px}
.addrow{display:flex;gap:10px}
.addinput{flex:1;background:#222;border:2px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--white);font-family:'Barlow',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.addinput::placeholder{color:var(--muted)}
.addinput:focus{border-color:var(--lime)}
.addbtn{padding:12px 20px;border-radius:8px;border:none;background:var(--lime);color:var(--black);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.95rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.addbtn:hover{opacity:.85}
.addbtn:disabled{opacity:.3;cursor:default}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.ltitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin-bottom:12px}
.ci{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.88rem}
.ci:last-child{border-bottom:none}
.cn{width:26px;height:26px;border-radius:5px;background:var(--lime);color:var(--black);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cdel{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.72rem;padding:3px 8px;border-radius:4px;transition:all .2s;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.cdel:hover{border-color:#f44;color:#f44}
.nc{color:var(--muted);font-size:.82rem}
.foot{text-align:center;font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="topbar">
<img src="https://static.wixstatic.com/media/adbb06_14f3bbe5fae7475ea93b185b79740c92~mv2.png/v1/fill/w_430,h_80,al_c,q_95,enc_avif,quality_auto/06.png" alt="Grupo Limoeiro" class="logoimg">
<div class="ctitle">Campanha Jun/2026</div>
</div>
<div class="strip">Somos conhecidos por fazer do limao, uma limonada!</div>
<div class="w">
<div class="hero">
<div><div class="hl">Clientes fechados</div><div class="hc" id="cnt">0 <span>/ 15</span></div></div>
<div style="text-align:right"><div class="hl" style="margin-bottom:5px">Restam</div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2.2rem;color:#333;line-height:1" id="rem">15</div></div>
</div>
<div class="bwrap">
<div class="blbl">Progresso - junho 2026</div>
<div class="bbg"><div class="bfill" id="bar" style="width:0%"></div></div>
</div>
<div class="dots" id="grid"></div>
<div class="dcard">
<div class="dtag" id="tag"></div>
<span class="demoji" id="emo"></span>
<div class="dmsg" id="msg"></div>
</div>
<div class="ctrls">
<button class="btn bprev" id="bp" onclick="cd(-1)">Anterior</button>
<button class="btn bnext" id="bn" onclick="cd(1)">Proximo</button>
</div>
<div class="addbox">
<div class="addtitle">+ Registrar cliente fechado</div>
<div class="addrow">
<input class="addinput" id="ni" type="text" placeholder="Nome do cliente..." maxlength="60" onkeydown="if(event.key==='Enter')ac()">
<button class="addbtn" id="ab" onclick="ac()">Fechar</button>
</div>
</div>
<div class="lcard">
<div class="ltitle">Clientes fechados</div>
<div id="cl"></div>
</div>
<div class="foot"><span id="rf">15</span> clientes restantes</div>
</div>
<script>
const M=[
{e:"🔥",t:"Arrancada! A meta esta clara: 15 clientes em junho. Cada contato feito agora e uma semente. Plantem bem — os resultados de final de mes sao construidos aqui."},
{e:"🎯",t:"Foco total. O pipeline nao se constroi esperando — liga, visita, manda a proposta. Acao gera resultado."},
{e:"💡",t:"Quem fecha mais clientes e quem entende melhor o problema do cliente. Antes de falar, pergunte. Ouca com atencao. A solucao vem naturalmente."},
{e:"⚡",t:"Urgencia e combustivel. Prospects em duvida precisam de um empurrao — e voces sao esse empurrao. Nao deixem leads esfriarem."},
{e:"🏆",t:"Times que chegam longe sao os que nao param quando esta dificil. O resultado aparece pra quem nao desiste."},
{e:"🚀",t:"Fechem a semana forte! Revisem o pipeline: tem alguem esperando retorno? O follow-up de hoje fecha o negocio de segunda."},
{e:"📋",t:"Final de semana estrategico. Organizem os contatos e revisem propostas abertas para comecar bem a semana."},
{e:"💪",t:"Segunda semana! Voces chegaram aqui com 4 clientes fechados — isso e consistencia. A curva vira hoje."},
{e:"🔍",t:"Qual e o perfil dos clientes que fecharam mais rapido? Repliquem esse approach com os prospects em aberto."},
{e:"🌟",t:"Dez dias. Voces sabem mais sobre o mercado agora do que no comeco. Use esse conhecimento hoje."},
{e:"🔑",t:"Um terco do mes. Cada cliente a mais agora vale dobrado la na frente. Intensifiquem sem perder qualidade."},
{e:"⏱️",t:"Prospects pensando precisam de um motivo para decidir agora. Criem esse motivo — movam o ponteiro hoje."},
{e:"🦁",t:"Metade do mes se aproxima. O que esta em aberto? Tragam para perto, aquecam, fechem."},
{e:"🎯",t:"Sabado de revisao. O que funcionou? As melhores vendas da proxima semana comecam com as perguntas certas feitas hoje."},
{e:"🌅",t:"Meio do mes. 15 dias pela frente — suficiente para bater a meta. Mas so com a mesma intensidade. Vamos!"},
{e:"🔥",t:"Semana decisiva. Cada contato pesa mais — o fim do mes esta mais perto e os clientes sentem a pressao tambem."},
{e:"📞",t:"A ligacao que voce esta com preguica de fazer hoje pode ser a que fecha o negocio. Menos hesitacao, mais acao."},
{e:"🧠",t:"Revisem quais propostas estao abertas ha mais de 5 dias. Um follow-up bem feito hoje pode virar assinatura amanha."},
{e:"⚡",t:"Quinta-feira e o dia mais produtivo da semana. Agendem as conversas mais importantes agora."},
{e:"🚀",t:"Sexta! Fechem a terceira semana com conquistas. Garantam o proximo passo claro com cada cliente."},
{e:"🏅",t:"Sabado de recarga. Descansem com consciencia. E ja pensem: quem voces vao ligar na segunda de manha?"},
{e:"🌟",t:"Ultima semana completa! Pressao e privilegio de quem esta na corrida. Cada dia desta semana vale ouro."},
{e:"💡",t:"Fechamentos no fim do mes acontecem porque alguem teve a coragem de pedir o sim na hora certa."},
{e:"🎯",t:"Terca decisiva. Priorizem os leads mais quentes. Agora o foco e total."},
{e:"🦁",t:"Cinco dias para o fim do mes. Liguem. Visitem. Mandem o contrato. A meta esta ao alcance."},
{e:"⏱️",t:"Quatro dias. Hora de converter o que ja esta quente. Identifiquem o mais proximo de fechar e fechem."},
{e:"🔑",t:"Ainda ha tempo hoje para fazer a diferenca. Um e-mail, uma ligacao, uma proposta — facam agora."},
{e:"📋",t:"Usem o domingo para organizar o ataque final: segunda e terca podem definir o resultado do mes."},
{e:"🚀",t:"Penultimo dia! Esforco maximo hoje. Se a meta ja foi — ajudem o colega ou abram o proximo mes com vantagem."},
{e:"🏆",t:"Ultimo dia de junho. Fechem com tudo. Amanha celebrem. O Grupo Limoeiro fez a limonada! 🍋"},
];
let d=7;
let CL=[{n:"Maria Fit"},{n:"Hidrodomi"},{n:"Tia Zuma"},{n:"Marett Calcados"}];
const S=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
const gd=i=>S[(1+i)%7];
function rg(){const g=document.getElementById("grid");g.innerHTML="";for(let i=0;i<15;i++){const e=document.createElement("div");const on=i<CL.length;e.className="dot"+(on?" on":"");if(on){e.textContent="V";const t=document.createElement("div");t.className="tip";t.textContent=CL[i].n;e.appendChild(t);}else e.textContent=i+1;g.appendChild(e);}}
function rp(){const c=CL.length;document.getElementById("cnt").innerHTML=c+' <span>/ 15</span>';document.getElementById("bar").style.width=(c/15*100)+"%";document.getElementById("rem").textContent=15-c;document.getElementById("rf").textContent=15-c;const dn=c>=15;document.getElementById("ab").disabled=dn;document.getElementById("ni").disabled=dn;document.getElementById("ni").placeholder=dn?"Meta atingida!":"Nome do cliente...";}
function rm(){const m=M[d];document.getElementById("tag").textContent=String(d+1).padStart(2,"0")+"/jun - "+gd(d)+" - Dia "+(d+1)+" de 30";document.getElementById("emo").textContent=m.e;document.getElementById("msg").textContent=m.t;document.getElementById("bp").disabled=d===0;document.getElementById("bn").disabled=d===29;}
function rl(){const inn=document.getElementById("cl");if(!CL.length){inn.innerHTML='<div class="nc">Nenhum cliente ainda. Use o campo acima para adicionar.</div>';return;}inn.innerHTML=CL.map((c,i)=>'<div class="ci"><div class="cn">'+(i+1)+'</div><span>'+c.n+'</span><button class="cdel" onclick="rc('+i+')">remover</button></div>').join("");}
function rc(i){if(confirm('Remover "'+CL[i].n+'"?')){CL.splice(i,1);ra();}}
function ac(){const inp=document.getElementById("ni");const n=inp.value.trim();if(!n){inp.focus();return;}if(CL.length>=15){alert("Meta atingida!");return;}CL.push({n});inp.value="";inp.focus();ra();}
function cd(v){d=Math.max(0,Math.min(29,d+v));rm();}
function ra(){rg();rp();rm();rl();}
ra();
</script>
</body>
</html>
